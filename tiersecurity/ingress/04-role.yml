apiVersion: rbac.authorization.k8s.io/v1
kind: role 
metadata:
  name: nginx-ingress-role
  namespace: nginx-ingress
rules:
- apiGroups: [""]
  resources: ["configmaps", "endpoints", "nodes", "pods", "secrets"]
  verbs: ["list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["nginx-ingress-controller"]
  verbs: ["get","update"]
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["nginx-ingress-controller"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["endpoints"]
  resourceNames: ["nginx-ingress-controller"]
  verbs: ["get","update"]
