apiversiion: v1
kind: deployment
metadata:
  name: uspr
  labels:
    app: uspr

spec:
  replicas: 1
  selector:
    matchLabels:
      app: uspr
  template:
    metadata:
      labels:
        app: uspr
    spec:
      containers:
      - name: uspr
        image: rocker/rstudio
        ports:
        - containerPort: 8787
        volumeMounts:
        - name: uspr-pvc
          mountPath: /home/uspr
      volumes:
      - name: uspr-pvc
        persistentVolumeClaim:
          claimName: uspr-pvc
volumes:
  - name: uspr-config
    configMap:
      name: uspr-config
  - name: uspr-data
    persistentVolumeClaim:
      claimName: uspr-data
  - name: uspr-logs
    persistentVolumeClaim:
      claimName: uspr-logs

volumemounts:
  - name: uspr-config
    mountPath: /etc/uspr
  - name: uspr-data
    mountPath: /home/uspr
  - name: uspr-logs
    mountPath: /var/log/uspr